<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Personality World — UI Frames</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pw.css">
<style>
  html,body{margin:0;height:100%;background:#f0eee9;font-family:'Nunito',system-ui,sans-serif;}
  #root{height:100%;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ui-kit.jsx"></script>
<script type="text/babel" src="screens-a.jsx"></script>
<script type="text/babel" src="screens-b.jsx"></script>

<script type="text/babel">
const FRAMES = [
  ['01 · Intro Hero',        Frame01],
  ['02 · Choose Your Pet',   Frame02],
  ['03 · Question 1',        Frame03],
  ['04 · Question 2',        Frame04],
  ['05 · Question 3',        Frame05],
  ['06 · Building Their World', Frame06],
  ['07 · Personality Reveal',   Frame07],
  ['08 · Explore Their World',  Frame08],
  ['09 · Pet Profile Card',     Frame09],
  ['10 · Brand Closing',        Frame10],
];

function App() {
  return (
    <DesignCanvas>
      <DCSection id="ppw" title="Pet Personality World" subtitle="10 mobile frames · 390 × 844 · playful pet personality quiz">
        {FRAMES.map(([label, F], i) => (
          <DCArtboard key={i} id={`f${i+1}`} label={label} width={390} height={844}>
            <F />
          </DCArtboard>
        ))}
      </DCSection>
    </DesignCanvas>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

// capture helper — render a single frame centered & scaled to fit, for image export
window.capFrame = (n) => {
  const F = FRAMES[n-1][1];
  const scale = Math.min((window.innerWidth - 36) / 390, (window.innerHeight - 36) / 844);
  document.body.style.background = '#f4f3f7';
  root.render(
    <div style={{ position:'fixed', inset:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ width:390, height:844, transform:`scale(${scale})`, transformOrigin:'center',
        boxShadow:'0 18px 50px rgba(40,30,80,.16)', borderRadius:16, overflow:'hidden' }}>
        <F />
      </div>
    </div>
  );
};
window.showCanvas = () => root.render(<App />);
</script>
</body>
</html>
