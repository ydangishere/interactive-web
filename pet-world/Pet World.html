<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Personality World — Interactive Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pw.css">
<style>
  html,body{margin:0;height:100%;background:#ddd6ec;font-family:'Nunito',system-ui,sans-serif;overflow:hidden;}
  #root{height:100%;}
  /* JS scaler keeps the phone fully visible on any viewport */
  .phone{ transform-origin:center center; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>
<script type="text/babel" src="ui-kit.jsx"></script>
<script type="text/babel" src="screens-a.jsx"></script>
<script type="text/babel" src="screens-b.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>

<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<PhoneApp />);

  // scale the phone to always fit the viewport
  function fit() {
    const phone = document.querySelector('.phone');
    if (!phone) return;
    if (window.innerWidth < 60 || window.innerHeight < 60) return; // ignore 0-size relayouts
    const pad = 24;
    const s = Math.max(0.2, Math.min((window.innerWidth - pad) / 412, (window.innerHeight - pad) / 866, 1.15));
    phone.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fit);
  const fitLoop = setInterval(fit, 200);
  setTimeout(() => clearInterval(fitLoop), 2000);
  setTimeout(fit, 60);
</script>
</body>
</html>
