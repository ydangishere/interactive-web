<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet World — Capture Frame</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pw.css">
<style>
  html,body{margin:0;height:100%;background:#f4f3f7;font-family:'Nunito',system-ui,sans-serif;}
  #root{height:100%;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>
<script type="text/babel" src="ui-kit.jsx"></script>
<script type="text/babel" src="screens-a.jsx"></script>
<script type="text/babel" src="screens-b.jsx"></script>

<script type="text/babel">
const FRAMES = [
  ['01 · Intro Hero', Frame01],
  ['02 · Choose Your Pet', Frame02],
  ['03 · Question 1', Frame03],
  ['04 · Question 2', Frame04],
  ['05 · Question 3', Frame05],
  ['06 · Building Their World', Frame06],
  ['07 · Personality Reveal', Frame07],
  ['08 · Explore Their World', Frame08],
  ['09 · Pet Profile Card', Frame09],
  ['10 · Brand Closing', Frame10],
];

const n = Math.max(1, Math.min(10, parseInt(new URLSearchParams(location.search).get('n') || '1', 10)));
const F = FRAMES[n - 1][1];
const scale = Math.min((window.innerWidth - 36) / 390, (window.innerHeight - 36) / 844, 1);

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <div style={{ position:'fixed', inset:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
    <div data-capture-frame={n} style={{ width:390, height:844, transform:`scale(${scale})`, transformOrigin:'center',
      boxShadow:'0 18px 50px rgba(40,30,80,.16)', borderRadius:16, overflow:'hidden' }}>
      <F />
    </div>
  </div>
);
document.title = 'Pet World — ' + FRAMES[n - 1][0];
</script>
</body>
</html>
